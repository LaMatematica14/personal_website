<!DOCTYPE html>
<html>
<head>
<style>
.spacing {
  display: flex;
  background-color: rgba(0, 0, 0, 0.7);
  padding: 3rem 4rem;
  align-items: center;
  justify-content: center;
  min-height: 600px;
  font-family: 'Terminus', Courier, 'Courier New', monospace;
  font-size: 50px;
}
.spacing h1 {
  text-align: center;
  color: white;
  margin: 0;
}

.heading-divider {
  width: 100%;
  border: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, red, transparent);
  margin: 0.5em auto;
}

.cursor {
  display: inline-block;
  width: 4px;
  height: 1em;
  background-color: red;
  margin-left: 5px;
  vertical-align: middle;
  opacity: 1;
}
</style>
</head>
<body>
<section class="spacing">
    <h1 style="position: relative;">
        <!-- Invisible placeholder that maintains exact final dimensions -->
        <span style="visibility: hidden;">
            Benvenut* al mio sito!
            <br>
            <hr class="heading-divider">
            Sono Sofia Maragò.
        </span>
        
        <!-- The actual animated text -->
        <span style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; text-align: center;">
            <span class="line-1">Benven</span><span class="cursor cursor-1"></span>
            <br>
            <hr class="heading-divider">
            <span class="line-2"></span><span class="cursor cursor-2" style="opacity:0"></span>
        </span>
    </h1>
</section>
</body>
</html>
